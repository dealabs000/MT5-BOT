name: MT5 Demo Bot

on:
  workflow_dispatch:   # manual trigger only — click "Run workflow" in the Actions tab
    inputs:
      max_minutes:
        description: "Max run time in minutes (keep under 350 to stay well inside the 6hr limit)"
        required: false
        default: "230"
      symbol:
        description: "Symbol to trade"
        required: false
        default: "EURUSD"

jobs:
  run-bot:
    runs-on: windows-latest
    timeout-minutes: 360   # hard GitHub-side cap as a safety net

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install MetaTrader5

      - name: Install MT5 terminal
        shell: powershell
        run: |
          Invoke-WebRequest -Uri "https://download.mql5.com/cdn/web/metaquotes.software.corp/mt5/mt5setup.exe" -OutFile mt5setup.exe
          Start-Process -FilePath mt5setup.exe -ArgumentList "/auto" -NoNewWindow -Wait
          Start-Sleep -Seconds 45

      - name: Find MT5 install location
        shell: powershell
        run: |
          Write-Host "Searching for terminal64.exe on C: drive..."
          $found = Get-ChildItem "C:\" -Recurse -Filter "terminal64.exe" -ErrorAction SilentlyContinue -Force
          if ($found) {
            $found | ForEach-Object { Write-Host "Found: $($_.FullName)" }
            $foundPath = $found[0].FullName
            Write-Host "Using: $foundPath"
            "MT5_PATH=$foundPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          } else {
            Write-Host "terminal64.exe not found anywhere on C: drive"
            exit 1
          }

      - name: Run bot
        env:
          MAX_MINUTES: ${{ github.event.inputs.max_minutes }}
          SYMBOL: ${{ github.event.inputs.symbol }}
        run: python bot.py

      - name: Upload run log
        if: always()   # save the log even if the bot crashed
        uses: actions/upload-artifact@v4
        with:
          name: bot-run-log
          path: bot_run.log
